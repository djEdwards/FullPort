                    <div class="chart-card p-4 h-100 text-center">
                        <h6 class="mb-3">Portfolio Health Score</h6>
                        <div style="position: relative; width: 150px; height: 150px; margin: 0 auto;">
                            <canvas id="healthScoreChart"></canvas>
                            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                                <div style="font-size: 2.5rem; font-weight: bold; color: ${scoreColor};">${Math.round(health.healthScore)}</div>
                                <div class="text-muted small">${scoreLabel}</div>
                            </div>
                        </div>
                        <div class="mt-3 text-start">
                            <small class="text-muted d-block mb-2">Score factors:</small>
                            <div class="d-flex justify-content-between small">
                                <span>Diversification</span>
                                <span class="${health.concentration.effectiveHoldings >= 5 ? 'text-success' : 'text-warning'}">${health.concentration.effectiveHoldings.toFixed(1)} effective holdings</span>
                            </div>
                            <div class="d-flex justify-content-between small">
                                <span>Top Concentration</span>
                                <span class="${health.concentration.topHoldingPercent < 25 ? 'text-success' : 'text-warning'}">${health.concentration.topHoldingPercent.toFixed(1)}%</span>
                            </div>
                            <div class="d-flex justify-content-between small">
                                <span>Asset Classes</span>
                                <span class="${health.sectorExposure.length >= 3 ? 'text-success' : 'text-warning'}">${health.sectorExposure.length}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Benchmark Comparison -->
                <div class="col-lg-8">
                    <div class="chart-card p-4 h-100">
                        <h6 class="mb-3">Today vs Benchmarks</h6>
                        ${benchmark?.hasData ? `
                            <div class="row mb-3">
                                <div class="col-auto">
                                    <div class="p-3 rounded" style="background: var(--primary-gradient);">
                                        <div class="text-white small opacity-75">Your Portfolio</div>
                                        <div class="h4 text-white mb-0">${benchmark.portfolio.dayChangePercent >= 0 ? '+' : ''}${benchmark.portfolio.dayChangePercent.toFixed(2)}%</div>
                                        <div class="text-white small">${formatCurrency(benchmark.portfolio.dayChange)}</div>
                                    </div>
                                </div>
                            </div>
                            <div class="row g-3">
                                ${benchmark.benchmarks.map(b => `
                                    <div class="col-md-3 col-6">
                                        <div class="p-3 rounded ${b.beating ? 'bg-success bg-opacity-10' : 'bg-danger bg-opacity-10'}">
                                            <div class="d-flex justify-content-between align-items-center mb-1">
                                                <strong>${b.symbol}</strong>
                                                ${b.beating ? '<span class="text-success">✓</span>' : ''}
                                            </div>
                                            <div class="small text-muted">${b.name}</div>
                                            <div class="h5 mb-0 ${b.dayChangePercent >= 0 ? 'text-success' : 'text-danger'}">
                                                ${b.dayChangePercent >= 0 ? '+' : ''}${b.dayChangePercent.toFixed(2)}%
                                            </div>
                                            <div class="small ${b.relativePerformance >= 0 ? 'text-success' : 'text-danger'}">
                                                ${b.relativePerformance >= 0 ? '▲' : '▼'} ${Math.abs(b.relativePerformance).toFixed(2)}% vs you
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-3 text-center">
                                <span class="badge ${benchmark.summary.beatingCount > benchmark.summary.totalBenchmarks / 2 ? 'bg-success' : 'bg-secondary'}">
                                    Beating ${benchmark.summary.beatingCount}/${benchmark.summary.totalBenchmarks} benchmarks today
                                </span>
                            </div>
                        ` : '<p class="text-muted">Benchmark data unavailable</p>'}
                    </div>
                </div>
            </div>

            <!-- Concentration & Correlation Row -->
            <div class="row g-4 mb-4">
                <!-- Top Holdings Concentration -->
                <div class="col-lg-6">
                    <div class="chart-card p-4 h-100">
                        <h6 class="mb-3">Position Concentration</h6>
                        <div class="row">
                            <div class="col-md-6">
                                <canvas id="concentrationChart" height="200"></canvas>
                            </div>
                            <div class="col-md-6">
                                <table class="table table-sm">
                                    <tbody>
                                        ${health.topHoldings.slice(0, 5).map((h, i) => `
                                            <tr>
                                                <td><span class="badge" style="background: ${['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'][i]}">${i + 1}</span></td>
                                                <td><strong>${h.symbol}</strong></td>
                                                <td class="text-end">${h.weight.toFixed(1)}%</td>
                                                <td class="text-end ${h.dayChangePercent >= 0 ? 'text-success' : 'text-danger'}">${h.dayChangePercent >= 0 ? '+' : ''}${h.dayChangePercent.toFixed(2)}%</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                                <div class="small text-muted">
                                    Top 5: ${health.concentration.top5Percent.toFixed(1)}% of portfolio
                                </div>
                            </div>
                        </div>
                        ${health.concentration.concentrationWarnings.length > 0 ? `
                            <div class="alert alert-warning mt-3 mb-0 py-2">
                                <small>${health.concentration.concentrationWarnings.slice(0, 2).join('<br>')}</small>
                            </div>
                        ` : ''}
                    </div>
                </div>

                <!-- Correlation Heatmap -->
                <div class="col-lg-6">
                    <div class="chart-card p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="mb-0">Correlation Matrix</h6>
                            ${correlation?.method ? `
                                <span class="badge ${correlation.method === 'historical' ? 'bg-success' : 'bg-warning'}">
                                    ${correlation.method === 'historical' ? `${correlation.dataPoints || 60} days` : 'Today only'}
                                </span>
                            ` : ''}
                        </div>
                        ${correlation?.hasData ? `
                            <div class="correlation-matrix mb-3">
                                <table class="table table-bordered mb-0" style="table-layout: fixed;">
                                    <thead>
                                        <tr>
                                            <th style="width: 60px; background: #f8f9fa;"></th>
                                            ${correlation.symbols.map(s => `
                                                <th class="text-center p-2" style="background: #f8f9fa; font-size: 0.8rem; font-weight: 600;">
                                                    ${s}
                                                </th>
                                            `).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${correlation.symbols.map((s, i) => `
                                            <tr>
                                                <th class="text-end p-2" style="background: #f8f9fa; font-size: 0.8rem; font-weight: 600;">${s}</th>
                                                ${correlation.matrix[i].map((val, j) => {
                                                    // More granular color scale for stock correlations
                                                    // Most stocks are positively correlated (0.3-0.7 is common)
                                                    // Negative correlations are rare and valuable
                                                    let bgColor, textColor, intensity;

                                                    if (i === j) {
                                                        bgColor = '#e5e7eb';
                                                        textColor = '#9ca3af';
                                                    } else if (val >= 0.6) {
                                                        // High positive - very correlated (bad for diversification)
                                                        intensity = 0.5 + (val - 0.6) * 1.25; // 0.5 to 1.0
                                                        bgColor = `rgba(185, 28, 28, ${intensity})`; // Dark red
                                                        textColor = intensity > 0.7 ? 'white' : '#7f1d1d';
                                                    } else if (val >= 0.4) {
                                                        // Moderate-high positive
                                                        intensity = 0.4 + (val - 0.4) * 1.5; // 0.4 to 0.7
                                                        bgColor = `rgba(220, 38, 38, ${intensity})`; // Red
                                                        textColor = intensity > 0.6 ? 'white' : '#991b1b';
                                                    } else if (val >= 0.2) {
                                                        // Moderate positive
                                                        intensity = 0.4 + (val - 0.2) * 1.5; // 0.4 to 0.7
                                                        bgColor = `rgba(251, 146, 60, ${intensity})`; // Orange
                                                        textColor = '#9a3412';
                                                    } else if (val >= 0) {
                                                        // Low positive - decent diversification
                                                        intensity = 0.2 + val * 1.0; // 0.2 to 0.4
                                                        bgColor = `rgba(250, 204, 21, ${intensity})`; // Yellow
                                                        textColor = '#713f12';
                                                    } else if (val >= -0.2) {
                                                        // Near zero / slight negative - good diversification
                                                        intensity = 0.3 + Math.abs(val) * 1.0; // 0.3 to 0.5
                                                        bgColor = `rgba(134, 239, 172, ${intensity})`; // Light green
                                                        textColor = '#166534';
                                                    } else if (val >= -0.4) {
                                                        // Moderate negative - great diversification
                                                        intensity = 0.5 + (Math.abs(val) - 0.2) * 1.25; // 0.5 to 0.75
                                                        bgColor = `rgba(34, 197, 94, ${intensity})`; // Green
                                                        textColor = intensity > 0.6 ? 'white' : '#166534';
                                                    } else {
                                                        // High negative - excellent diversification (rare!)
                                                        intensity = 0.6 + (Math.abs(val) - 0.4) * 0.67; // 0.6 to 1.0
                                                        bgColor = `rgba(22, 163, 74, ${intensity})`; // Dark green
                                                        textColor = 'white';
                                                    }
                                                    return `
                                                        <td class="text-center p-2" 
                                                            style="background: ${bgColor}; color: ${textColor}; font-weight: 600; font-size: 0.85rem; cursor: help;"
                                                            title="${i === j ? 'Self-correlation (always 1.0)' : `${correlation.symbols[i]} ↔ ${correlation.symbols[j]}: ${val.toFixed(2)}`}">
                                                            ${i === j ? '—' : val.toFixed(2)}
                                                        </td>`;
                                                }).join('')}
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>

                            <!-- Legend - Updated scale for stocks -->
                            <div class="mb-3">
                                <div class="d-flex flex-wrap justify-content-center gap-1 mb-2" style="font-size: 0.7rem;">
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(185, 28, 28, 0.7);">
                                        <span style="color: white;">0.6+ ⚠️</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(220, 38, 38, 0.5);">
                                        <span style="color: #7f1d1d;">0.4-0.6</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(251, 146, 60, 0.5);">
                                        <span style="color: #9a3412;">0.2-0.4</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(250, 204, 21, 0.4);">
                                        <span style="color: #713f12;">0-0.2</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(134, 239, 172, 0.5);">
                                        <span style="color: #166534;">-0.2-0 ✓</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(34, 197, 94, 0.6);">
                                        <span style="color: white;">-0.4 ✓✓</span>
                                    </span>
                                    <span class="d-flex align-items-center px-2 py-1 rounded" style="background: rgba(22, 163, 74, 0.8);">
                                        <span style="color: white;">&lt;-0.4</span>
                                    </span>
                                </div>
                                <div class="text-center text-muted" style="font-size: 0.7rem;">
                                    High positive = move together (concentrated) → Negative = move opposite (diversified)
                                </div>
                            </div>

                            <!-- Info box -->
                            <div class="alert ${correlation.method === 'historical' ? 'alert-success' : 'alert-warning'} mb-0 py-2">
                                <small>
                                    ${correlation.method === 'historical' 
                                        ? `<strong>Real correlation</strong> calculated from ${correlation.dataPoints || 60} days of daily returns.`
                                        : `<strong>Estimated only</strong> - based on today's price movements. Historical data unavailable.`
                                    }
                                    <br><span class="text-muted">Green = diversifying (holdings move opposite). Red = concentrated (move together).</span>
                                </small>
                            </div>
                        ` : '<p class="text-muted">Need at least 2 holdings for correlation analysis</p>'}
                    </div>
                </div>
            </div>

            <!-- Sector Exposure -->
            <div class="row g-4">
                <div class="col-12">
                    <div class="chart-card p-4">
                        <h6 class="mb-3">Asset Class Exposure</h6>
                        <div class="row">
                            ${health.sectorExposure.map(s => `
                                <div class="col-md-3 col-6 mb-3">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span>${s.sector}</span>
                                        <strong>${s.percent.toFixed(1)}%</strong>
                                    </div>
                                    <div class="progress" style="height: 8px;">
                                        <div class="progress-bar" style="width: ${s.percent}%; background: ${assetClassColors[s.sector] || '#64748b'};"></div>
                                    </div>
                                    <small class="text-muted">${formatCurrency(s.value)} • ${s.holdingsCount} holding${s.holdingsCount > 1 ? 's' : ''}</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>
            `;

            document.getElementById('analytics-content').innerHTML = html;

            // Draw charts
            setTimeout(() => {
                // Health score gauge
                new Chart(document.getElementById('healthScoreChart').getContext('2d'), {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [health.healthScore, 100 - health.healthScore],
                            backgroundColor: [scoreColor, '#e5e7eb'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        cutout: '80%',
                        rotation: -90,
                        circumference: 180,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } }
                    }
                });

                // Concentration pie chart
                if (health.topHoldings.length > 0) {
                    const top5 = health.topHoldings.slice(0, 5);
                    const otherWeight = 100 - top5.reduce((sum, h) => sum + h.weight, 0);

                    new Chart(document.getElementById('concentrationChart').getContext('2d'), {
                        type: 'doughnut',
                        data: {
                            labels: [...top5.map(h => h.symbol), otherWeight > 0 ? 'Other' : null].filter(Boolean),
                            datasets: [{
                                data: [...top5.map(h => h.weight), otherWeight > 0 ? otherWeight : null].filter(v => v !== null),
                                backgroundColor: ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#64748b'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            cutout: '50%',
                            plugins: {
                                legend: { display: false }
                            }
                        }
                    });
                }
            }, 100);
        }

        // ========== REBALANCE FUNCTIONALITY ==========
        let rebalanceModels = [];
        let selectedModel = null;
        let currentAnalysis = null;
        let calculatedTrades = null;

        const assetClassColors = {
            'USStock': '#6366f1',
            'InternationalStock': '#8b5cf6',
            'Bond': '#10b981',
            'Cash': '#f59e0b',
            'Commodity': '#ec4899',
            'RealEstate': '#06b6d4',
            'Crypto': '#f97316',
            'Other': '#64748b'
        };

        const assetClassNames = {
            'USStock': 'US Stocks',
            'InternationalStock': 'Int\'l Stocks',
            'Bond': 'Bonds',
            'Cash': 'Cash',
            'Commodity': 'Commodities',
            'RealEstate': 'Real Estate',
            'Crypto': 'Crypto',
            'Other': 'Other'
        };

        // Test mode cash override
        let testCashAmount = null;

        async function loadRebalance() {
            document.getElementById('rebalance-content').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">Loading...</p></div>';

            try {
                // Build analyze URL with optional test cash
                let analyzeUrl = '/api/rebalance/analyze';
                if (testCashAmount && testCashAmount > 0) {
                    analyzeUrl += `?testCash=${testCashAmount}`;
                }

                // Load models and analysis in parallel
                const [modelsResp, analysisResp] = await Promise.all([
                    fetch('/api/rebalance/models'),
                    fetch(analyzeUrl)
                ]);

                if (modelsResp.ok) {
                    rebalanceModels = await modelsResp.json();
                }

                if (analysisResp.ok) {
                    currentAnalysis = await analysisResp.json();
                    renderRebalance();
                } else if (analysisResp.status === 401) {
                    document.getElementById('rebalance-content').innerHTML = '<div class="alert alert-warning">Please authenticate first via the Dashboard tab.</div>';
                } else {
                    document.getElementById('rebalance-content').innerHTML = '<div class="alert alert-danger">Failed to load portfolio analysis.</div>';
                }
            } catch (err) {
                document.getElementById('rebalance-content').innerHTML = '<div class="alert alert-danger">Error loading rebalance data.</div>';
            }
        }

        function setTestCash(amount) {
            testCashAmount = amount;
            loadRebalance();
        }

        function clearTestCash() {
            testCashAmount = null;
            loadRebalance();
        }

        // Rebalance mode: 'rebalance' or 'builder'
        let rebalanceMode = 'rebalance';

        async function renderRebalance() {
            const analysis = currentAnalysis;
            if (!analysis) return;

            // If user has no holdings, force builder mode
            if (analysis.holdingsCount === 0 || analysis.invested === 0) {
                rebalanceMode = 'builder';
            }

            // Show Portfolio Builder mode
            if (rebalanceMode === 'builder') {
                await renderPortfolioBuilder(analysis);
                return;
            }

            // Show regular rebalance mode
            let html = `
            <!-- Mode Toggle -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="btn-group">
                    <button class="btn ${rebalanceMode === 'rebalance' ? 'btn-primary' : 'btn-outline-primary'}" onclick="switchRebalanceMode('rebalance')">
                        Rebalance Portfolio
                    </button>
                    <button class="btn ${rebalanceMode === 'builder' ? 'btn-primary' : 'btn-outline-primary'}" onclick="switchRebalanceMode('builder')">
                        Build New Positions
                    </button>
                </div>
                ${analysis.cash > 100 ? `<span class="badge bg-success fs-6">${formatCurrency(analysis.cash)} cash available</span>` : ''}
            </div>

            <!-- Current Allocation Summary -->
            <div class="summary-card p-4 mb-4">
                <div class="row align-items-center">
                    <div class="col-lg-4 mb-3 mb-lg-0">
                        <div class="label mb-1">Portfolio Value</div>
                        <h2 class="value mb-0">${formatCurrency(analysis.totalValue)}</h2>
                        <small class="opacity-75">${analysis.holdingsCount} positions</small>
                    </div>
                    <div class="col-lg-8">
                        <div class="label mb-2">Current Allocation by Asset Class</div>
                        <div class="allocation-bar mb-2">
                            ${analysis.byAssetClass.map(a => `
                                <div class="allocation-segment" style="width: ${a.currentPercent}%; background: ${assetClassColors[a.assetClass] || '#64748b'};" 
                                     title="${assetClassNames[a.assetClass] || a.assetClass}: ${a.currentPercent.toFixed(1)}%"></div>
                            `).join('')}
                        </div>
                        <div class="d-flex flex-wrap gap-3">
                            ${analysis.byAssetClass.map(a => `
                                <div class="d-flex align-items-center">
                                    <div style="width: 12px; height: 12px; border-radius: 3px; background: ${assetClassColors[a.assetClass] || '#64748b'};" class="me-2"></div>
                                    <small class="text-white">${assetClassNames[a.assetClass] || a.assetClass}: ${a.currentPercent.toFixed(1)}%</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Model Selection -->
            <h6 class="mb-3">Select Rebalancing Strategy</h6>
            <div class="row g-3 mb-4">
                ${rebalanceModels.map((model, idx) => `
                    <div class="col-md-4">
                        <div class="rebalance-card model-card p-3 h-100 ${selectedModel === idx ? 'selected' : ''}" onclick="selectModel(${idx})">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="mb-0">${model.name}</h6>
                                ${selectedModel === idx ? '<i class="bi bi-check-circle-fill text-primary"></i>' : ''}
                            </div>
                            <p class="small text-muted mb-3">${model.description}</p>
                            <div class="allocation-bar" style="height: 12px;">
                                ${model.allocations.map(a => `
                                    <div class="allocation-segment" style="width: ${a.targetPercent}%; background: ${assetClassColors[a.assetClass] || '#64748b'};"></div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `).join('')}
                <div class="col-md-4">
                    <div class="rebalance-card model-card p-3 h-100 ${selectedModel === 'custom' ? 'selected' : ''}" onclick="selectModel('custom')">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="mb-0">Custom</h6>
                            ${selectedModel === 'custom' ? '<i class="bi bi-check-circle-fill text-primary"></i>' : ''}
                        </div>
                        <p class="small text-muted mb-3">Define your own target allocation for each holding</p>
                        <div class="text-center text-muted small">
                            Custom allocation
                        </div>
                    </div>
                </div>
            </div>

            <!-- Rebalance Options -->
            <div class="rebalance-card p-3 mb-4">
                <h6 class="mb-3">Rebalance Options</h6>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label small">Minimum Trade Size</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="minTradeValue" class="form-control" value="50">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Tolerance %</label>
                        <div class="input-group">
                            <input type="number" id="tolerancePercent" class="form-control" value="2" step="0.5">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Allow Selling</label>
                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" id="allowSelling" checked>
                            <label class="form-check-label" for="allowSelling">Sell overweight positions</label>
                        </div>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="calculateRebalance()" ${selectedModel === null ? 'disabled' : ''}>
                            Calculate Trades
                        </button>
                    </div>
                </div>
            </div>

            <!-- Trade Preview (shown after calculation) -->
            <div id="trade-preview"></div>
            `;

            document.getElementById('rebalance-content').innerHTML = html;
        }

        function switchRebalanceMode(mode) {
            rebalanceMode = mode;
            selectedModel = null;
            builderSelectedModel = null;

        async function calculateRebalance() {
            if (selectedModel === null) return;

            const model = selectedModel === 'custom' 
                ? { name: 'Custom', riskProfile: 3, rebalanceByAssetClass: false, allocations: [] }
                : rebalanceModels[selectedModel];

            const request = {
                model: model,
                sellToRebalance: document.getElementById('allowSelling').checked,
                minimumTradeValue: parseFloat(document.getElementById('minTradeValue').value) || 50,
                tolerancePercent: parseFloat(document.getElementById('tolerancePercent').value) || 2
            };

            document.getElementById('trade-preview').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2">Calculating...</p></div>';

            try {
                const resp = await fetch('/api/rebalance/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });

                if (resp.ok) {
                    calculatedTrades = await resp.json();
                    renderTradePreview();
                } else {
                    document.getElementById('trade-preview').innerHTML = '<div class="alert alert-danger">Failed to calculate rebalance.</div>';
                }
            } catch (err) {
                document.getElementById('trade-preview').innerHTML = '<div class="alert alert-danger">Error calculating rebalance.</div>';
            }
        }

        async function previewTrades() {
            if (!calculatedTrades || calculatedTrades.requiredTrades.length === 0) return;

            try {
                const resp = await fetch('/api/rebalance/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trades: calculatedTrades.requiredTrades,
                        previewOnly: true
                    })
                });

                const result = await resp.json();
                alert(`Preview complete!\n\nSuccess: ${result.successCount}\nFailed: ${result.failedCount}\n\nCheck logs for details.`);
            } catch (err) {
                alert('Error previewing trades: ' + err.message);
            }
        }

        async function executeTrades() {
            if (!calculatedTrades || calculatedTrades.requiredTrades.length === 0) return;

            if (!confirm('⚠️ EXECUTE ALL TRADES?\n\nThis will place REAL orders with E*TRADE!\n\nBuys: ' + formatCurrency(calculatedTrades.estimatedTotalBuys) + '\nSells: ' + formatCurrency(calculatedTrades.estimatedTotalSells) + '\n\nAre you sure?')) return;

            try {
                const resp = await fetch('/api/rebalance/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trades: calculatedTrades.requiredTrades,
                        previewOnly: false
                    })
                });

                const result = await resp.json();

                let message = `Trade Execution Results:\n\n`;
                message += `Success: ${result.successCount}\n`;
                message += `Failed: ${result.failedCount}\n\n`;

                result.results.forEach(r => {
                    message += `${r.symbol} ${r.action}: ${r.success ? 'OK' : 'FAILED'} ${r.errorMessage || ''}\n`;
                });

                alert(message);

                // Refresh data

                console.log('ETF response status:', resp.status);
                if (resp.ok) {
                    suggestedETFs = await resp.json();
                    console.log('Loaded suggested ETFs:', suggestedETFs);
                } else {
                    console.error('ETF API returned error:', resp.status);
                    const el = document.getElementById('etf-selection');
                    if (el) el.innerHTML = '<div class="alert alert-warning">Failed to load ETF prices (status: ' + resp.status + '). You can still proceed manually.</div>';

                console.error('Failed to load suggested ETFs:', err);
                const el = document.getElementById('etf-selection');
                if (el) el.innerHTML = '<div class="alert alert-warning">Failed to load ETF prices. Check console for details.</div>';
            }
        }

        function selectBuilderModel(idx) {
            console.log('selectBuilderModel called with idx:', idx);
            console.log('Current suggestedETFs:', suggestedETFs);

            // Toggle selection - click again to deselect
            if (builderSelectedModel === idx) {
                builderSelectedModel = null;
                portfolioBuildItems = [];

            builderSelectedModel = idx;
            const model = rebalanceModels[idx];

            // Create portfolio items based on model allocations
            portfolioBuildItems = [];

            if (suggestedETFs && Object.keys(suggestedETFs).length > 0) {

        // Get a quote for a single symbol
        async function getQuote() {
            const symbol = document.getElementById('addSymbol').value.toUpperCase().trim();
            if (!symbol) {
                alert('Please enter a symbol');
                return;
            }

            document.getElementById('quote-result').innerHTML = '<span class="text-muted"><i class="bi bi-hourglass-split"></i> Getting quote...</span>';

            try {
                const resp = await fetch(`/api/market/quote/${symbol}`);
                if (resp.ok) {
                    const quotes = await resp.json();
                    if (quotes.length > 0) {
                        const q = quotes[0];
                        const changeClass = q.changePercent >= 0 ? 'text-success' : 'text-danger';
                        const changeSign = q.changePercent >= 0 ? '+' : '';
                        document.getElementById('quote-result').innerHTML = `
                            <div class="alert alert-light py-2">
                                <strong>${q.symbol}</strong> - ${q.description || 'N/A'}<br>
                                <span class="h5">${formatCurrency(q.lastPrice)}</span>
                                <span class="${changeClass}">${changeSign}${q.changePercent?.toFixed(2) || 0}%</span>
                                <small class="text-muted ms-2">Vol: ${(q.volume || 0).toLocaleString()}</small>
                            </div>
                        `;
                    } else {
                        document.getElementById('quote-result').innerHTML = '<span class="text-danger">Symbol not found</span>';
                    }
                } else {
                    document.getElementById('quote-result').innerHTML = '<span class="text-danger">Failed to get quote</span>';
                }
            } catch (err) {
                document.getElementById('quote-result').innerHTML = '<span class="text-danger">Error getting quote</span>';
            }
        }

            document.getElementById('addSharesGroup').style.display = addByType === 'shares' ? '' : 'none';
        }

        // Add a custom stock to the portfolio
        async function addCustomStock() {
            const symbol = document.getElementById('addSymbol').value.toUpperCase().trim();
            const addByType = document.getElementById('addByType').value;
            const autoRebalance = document.getElementById('autoRebalance').checked;

            if (!symbol) {
                alert('Please enter a symbol');
                return;
            }

            // Check if already in list
            if (portfolioBuildItems.some(i => i.symbol === symbol)) {
                alert(`${symbol} is already in your list`);
                return;
            }

            document.getElementById('quote-result').innerHTML = '<span class="text-muted"><i class="bi bi-hourglass-split"></i> Fetching quote...</span>';

            try {
                const resp = await fetch(`/api/market/quote/${symbol}`);
                if (!resp.ok) {
                    document.getElementById('quote-result').innerHTML = '<span class="text-danger">Failed to get quote</span>';
                    return;
                }

                const quotes = await resp.json();
                if (quotes.length === 0) {
                    document.getElementById('quote-result').innerHTML = '<span class="text-danger">Symbol not found</span>';
                    return;
                }

                const q = quotes[0];
                let requestedAmount;
                let requestedShares = null;

                if (addByType === 'shares') {
                    requestedShares = parseInt(document.getElementById('addShares').value) || 1;
                    if (requestedShares <= 0) {
                        document.getElementById('quote-result').innerHTML = '<span class="text-danger">Shares must be at least 1</span>';
                        return;
                    }
                    requestedAmount = requestedShares * q.lastPrice;
                } else {
                    requestedAmount = parseFloat(document.getElementById('addAmount').value) || 100;
                    if (requestedAmount <= 0) {
                        document.getElementById('quote-result').innerHTML = '<span class="text-danger">Amount must be greater than 0</span>';
                        return;
                    }
                }

                // Validate amount doesn't exceed available cash
                if (requestedAmount > currentAnalysis.cash) {
                    document.getElementById('quote-result').innerHTML = `<span class="text-danger">Amount (${formatCurrency(requestedAmount)}) exceeds available cash (${formatCurrency(currentAnalysis.cash)})</span>`;
                    return;
                }

                // Calculate percentage based on amount vs total cash
                const targetPercent = (requestedAmount / currentAnalysis.cash) * 100;

                const newItem = {
                    symbol: q.symbol,
                    name: q.description || q.symbol,
                    assetClass: 'Custom',
                    targetPercent: targetPercent,
                    currentPrice: q.lastPrice,
                    changePercent: q.changePercent,
                    isCustom: true,
                    fixedShares: requestedShares // Store fixed shares if specified
                };

                const currentTotal = getTotalAllocationPercent();

                if (currentTotal + targetPercent > 100) {
                    if (autoRebalance) {
                        // Rebalance: scale down existing items to make room
                        const availableForExisting = 100 - targetPercent;
                        const scaleFactor = currentTotal > 0 ? availableForExisting / currentTotal : 1;

                        portfolioBuildItems.forEach(item => {
                            item.targetPercent = item.targetPercent * scaleFactor;
                            // Clear fixed shares when rebalancing (they'll be recalculated)
                            if (!item.fixedShares) {
                                item.fixedShares = null;
                            }
                        });

                        portfolioBuildItems.push(newItem);
                        document.getElementById('quote-result').innerHTML = `<span class="text-success">✓ Added ${symbol} - existing allocations adjusted</span>`;
                    } else {
                        const maxAmount = ((100 - currentTotal) / 100) * currentAnalysis.cash;
                        document.getElementById('quote-result').innerHTML = `<span class="text-danger">Adding this would exceed available cash. Max: ${formatCurrency(maxAmount)}. Enable auto-rebalance to adjust allocations.</span>`;
                        return;
                    }
                } else {
                    portfolioBuildItems.push(newItem);
                    document.getElementById('quote-result').innerHTML = `<span class="text-success">✓ Added ${symbol}</span>`;
                }

                document.getElementById('addSymbol').value = '';
                renderETFSelection();
            } catch (err) {
                document.getElementById('quote-result').innerHTML = '<span class="text-danger">Error adding stock</span>';
            }
        }

        // Remove an item from the portfolio build list and rebalance remaining items
        function removeFromBuild(idx) {
            const removedItem = portfolioBuildItems[idx];
            const removedPercent = removedItem.targetPercent;

            portfolioBuildItems.splice(idx, 1);

            if (portfolioBuildItems.length === 0) {
                builderSelectedModel = null;
                updateStrategyCards();
                document.getElementById('etf-selection').innerHTML = '<div class="alert alert-info">Select a strategy above or add stocks manually.</div>';
                document.getElementById('build-preview').innerHTML = '';
            } else {
                // Rebalance: distribute the removed percentage proportionally among remaining items
                const currentTotal = getTotalAllocationPercent();
                if (currentTotal > 0) {
                    // Scale up remaining items to fill the gap (up to 95% to leave room for cash)
                    const targetTotal = Math.min(95, currentTotal + removedPercent);
                    const scaleFactor = targetTotal / currentTotal;

                    portfolioBuildItems.forEach(item => {
                        // Only scale items without fixed shares
                        if (!item.fixedShares) {
                            item.targetPercent = item.targetPercent * scaleFactor;
                        }
                    });
                }
                renderETFSelection();
            }
        }

        function renderETFSelection() {
            if (portfolioBuildItems.length === 0) return;

            const analysis = currentAnalysis;
            const cashToInvest = analysis.cash * 0.95; // Keep 5% reserve


            let html = `
            <h6 class="mb-3">Step 2: Select ETFs for Each Asset Class</h6>
            <div class="rebalance-card p-3 mb-4">
                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Asset Class</th>
                                <th>ETF</th>
                                <th class="text-end">Price</th>
                                <th class="text-end">Change</th>
                                <th class="text-end">Target %</th>
                                <th class="text-end">Est. Shares</th>
                                <th class="text-end">Est. Value</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            portfolioBuildItems.forEach((item, idx) => {
                // Use fixed shares if specified, otherwise calculate from percentage
                let shares;
                let estValue;
                if (item.fixedShares) {
                    shares = item.fixedShares;
                    estValue = shares * (item.currentPrice || 0);
                } else {
                    const targetValue = cashToInvest * (item.targetPercent / 100);
                    shares = item.currentPrice ? Math.floor(targetValue / item.currentPrice) : 0;
                    estValue = shares * (item.currentPrice || 0);
                }
                const changeClass = (item.changePercent || 0) >= 0 ? 'gain-positive' : 'gain-negative';
                const isCustom = item.isCustom || item.assetClass === 'Custom';

                html += `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div style="width: 12px; height: 12px; border-radius: 3px; background: ${assetClassColors[item.assetClass] || '#64748b'};" class="me-2"></div>
                            ${assetClassNames[item.assetClass] || item.assetClass || 'Stock'}
                        </div>
                    </td>
                    <td>
                        ${isCustom ? `<strong>${item.symbol}</strong> <small class="text-muted">${item.name}</small>` : `
                        <select class="form-select form-select-sm" style="width: 180px;" onchange="changeETF(${idx}, this.value)">
                            ${suggestedETFs && suggestedETFs[item.assetClass] ? suggestedETFs[item.assetClass].map(etf => `
                                <option value="${etf.symbol}" ${etf.symbol === item.symbol ? 'selected' : ''}>${etf.symbol} - ${etf.name}</option>
                            `).join('') : `<option value="${item.symbol}">${item.symbol} - ${item.name}</option>`}
                        </select>`}
                    </td>
                    <td class="text-end">${item.currentPrice ? formatCurrency(item.currentPrice) : '-'}</td>
                    <td class="text-end ${changeClass}">${item.changePercent ? (item.changePercent >= 0 ? '+' : '') + item.changePercent.toFixed(2) + '%' : '-'}</td>
                    <td class="text-end">${item.targetPercent.toFixed(1)}%</td>
                    <td class="text-end fw-bold">${shares}</td>
                    <td class="text-end">
                        ${formatCurrency(estValue)}
                        <button class="btn btn-link btn-sm text-danger p-0 ms-2" onclick="removeFromBuild(${idx})" title="Remove">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </td>
                </tr>
                `;
            });

            const totalEst = portfolioBuildItems.reduce((sum, item) => {
                let shares;
                if (item.fixedShares) {
                    shares = item.fixedShares;
                } else {
                    const targetValue = cashToInvest * (item.targetPercent / 100);
                    shares = item.currentPrice ? Math.floor(targetValue / item.currentPrice) : 0;
                }
                return sum + (shares * (item.currentPrice || 0));
            }, 0);

            // Calculate effective allocation (what % of cash is actually being invested)
            const effectiveAllocationPercent = analysis.cash > 0 ? (totalEst / analysis.cash) * 100 : 0;

            // Count items with 0 shares due to price being too high
            const zeroShareItems = portfolioBuildItems.filter(item => {
                if (item.fixedShares) return false;
                const targetValue = cashToInvest * (item.targetPercent / 100);
                const shares = item.currentPrice ? Math.floor(targetValue / item.currentPrice) : 0;
                return shares === 0 && item.currentPrice > 0;
            });

            const remainingCash = analysis.cash - totalEst;
            const isOverBudget = remainingCash < -0.01; // Allow tiny floating point errors
            const totalAllocationPercent = getTotalAllocationPercent();
            const hasUnpurchasableItems = zeroShareItems.length > 0;

            // Calculate the cash allocation from the strategy (what's not being invested)
            const cashAllocationPercent = analysis.cash > 0 ? (remainingCash / analysis.cash) * 100 : 0;
            const targetCashPercent = builderSelectedModel !== null && rebalanceModels[builderSelectedModel] 
                ? (rebalanceModels[builderSelectedModel].allocations.find(a => a.assetClass === 'Cash')?.targetPercent || 5)
                : 5;
            const isHighRemainingCash = cashAllocationPercent > targetCashPercent + 5; // More than 5% above target

            html += `
                        </tbody>
                        <tfoot class="table-light">
                            <tr>
                                <td colspan="6" class="text-end fw-bold">Total Investment:</td>
                                <td class="text-end fw-bold">${formatCurrency(totalEst)}</td>
                            </tr>
                            <tr>
                                <td colspan="6" class="text-end">Remaining Cash:</td>
                                <td class="text-end ${isHighRemainingCash ? 'text-warning fw-bold' : ''}">${formatCurrency(remainingCash)} <small class="text-muted">(${cashAllocationPercent.toFixed(1)}%)</small></td>
                            </tr>
                            <tr>
                                <td colspan="6" class="text-end">Total Allocation:</td>
                                <td class="text-end">${(effectiveAllocationPercent + cashAllocationPercent).toFixed(1)}%</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                ${isHighRemainingCash ? `
                    <div class="alert alert-info mt-3">
                        <strong>High remaining cash (${cashAllocationPercent.toFixed(1)}%)</strong> - Your strategy targets ${targetCashPercent}% cash, but ${cashAllocationPercent.toFixed(1)}% remains uninvested.
                        This is because shares must be purchased in whole numbers, and some ETF prices are too high for their allocated amounts.
                        <br><small class="text-muted">Tip: You can manually add more shares of lower-priced ETFs to reduce cash.</small>
                    </div>
                ` : ''}
                ${hasUnpurchasableItems ? `
                    <div class="alert alert-warning mt-3">
                        <strong>${zeroShareItems.length} item(s) show 0 shares</strong> because their price exceeds the allocated amount. 
                        Consider: increasing allocations, choosing lower-priced ETFs, or adding more cash.
                        <br><small class="text-muted">Items affected: ${zeroShareItems.map(i => i.symbol).join(', ')}</small>
                    </div>
                ` : ''}
                ${isOverBudget ? `
                    <div class="alert alert-danger mt-3 mb-0">
                        Total investment exceeds available cash by ${formatCurrency(Math.abs(remainingCash))}. Please remove items or reduce allocations.
                    </div>
                ` : `
                    <div class="mt-3">
                        <button class="btn btn-primary" onclick="buildPortfolio()">
                            Preview Trades
                        </button>
                    </div>
                `}
            </div>
            `;

            document.getElementById('etf-selection').innerHTML = html;
        }

        function changeETF(idx, symbol) {
            const item = portfolioBuildItems[idx];
            const etfsForClass = suggestedETFs[item.assetClass];
            const newETF = etfsForClass?.find(e => e.symbol === symbol);

            if (newETF) {
                portfolioBuildItems[idx] = {
                    ...item,
                    symbol: newETF.symbol,
                            name: newETF.name,
                                currentPrice: newETF.currentPrice,
                                changePercent: newETF.changePercent
                            };
                        }

                        renderETFSelection();
                    }

                    async function buildPortfolio() {
                        if (portfolioBuildItems.length === 0) return;

                        const analysis = currentAnalysis;

                        document.getElementById('build-preview').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2">Building portfolio...</p></div>';

                        try {
                            const resp = await fetch('/api/market/build-portfolio', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    accountIdKey: analysis.accountIdKey, // Pass account ID for trade execution
                                    cashToInvest: analysis.cash,
                                    cashReservePercent: 5,
                                    riskProfile: builderSelectedModel,
                                    items: portfolioBuildItems
                                })
                            });

                            if (resp.ok) {
                                buildResult = await resp.json();
                                renderBuildPreview();
                } else {
                    document.getElementById('build-preview').innerHTML = '<div class="alert alert-danger">Failed to build portfolio.</div>';
                }
            } catch (err) {
                document.getElementById('build-preview').innerHTML = '<div class="alert alert-danger">Error building portfolio.</div>';
            }
        }

        function renderBuildPreview() {
            if (!buildResult) return;

            let html = `
            <h6 class="mb-3">Step 3: Review & Execute</h6>
            <div class="rebalance-card p-3 mb-4">
                <div class="row mb-3">
                    <div class="col-md-3 text-center">
                        <div class="text-muted small">Total Cash</div>
                        <div class="h5 mb-0">${formatCurrency(buildResult.summary.totalCash)}</div>
                    </div>
                    <div class="col-md-3 text-center">
                        <div class="text-muted small">Cash Reserve (5%)</div>
                        <div class="h5 mb-0">${formatCurrency(buildResult.summary.cashReserve)}</div>
                    </div>
                    <div class="col-md-3 text-center">
                        <div class="text-muted small">To Invest</div>
                        <div class="h5 mb-0 text-success">${formatCurrency(buildResult.summary.totalInvestment)}</div>
                    </div>
                    <div class="col-md-3 text-center">
                        <div class="text-muted small">Trades</div>
                        <div class="h5 mb-0">${buildResult.summary.tradeCount}</div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Symbol</th>
                                <th>Description</th>
                                <th>Action</th>
                                <th class="text-end">Shares</th>
                                <th class="text-end">Price</th>
                                <th class="text-end">Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${buildResult.trades.map(t => `
                                <tr class="trade-buy">
                                    <td><strong>${t.symbol}</strong></td>
                                    <td class="small text-muted">${t.description || ''}</td>
                                    <td><span class="badge bg-success">${t.action}</span></td>
                                    <td class="text-end">${t.quantity}</td>
                                    <td class="text-end">${formatCurrency(t.estimatedPrice)}</td>
                                    <td class="text-end fw-bold">${formatCurrency(t.estimatedValue)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-outline-primary" onclick="previewBuildTrades()">
                        Preview with E*TRADE
                    </button>
                    <button class="btn btn-success" onclick="executeBuildTrades()">
                        Execute & Build Portfolio
                    </button>
                </div>
            </div>
            `;

            document.getElementById('build-preview').innerHTML = html;
        }

        async function previewBuildTrades() {
            if (!buildResult || buildResult.trades.length === 0) return;

            const marketStatus = getMarketStatus();
            if (!marketStatus.isOpen) {
                alert(`⚠️ Market is currently closed (${marketStatus.statusText})\n\nCurrent time: ${marketStatus.currentTime} ET\n${marketStatus.nextEvent}\n\nTrade preview/execution is only available during market hours (9:30 AM - 4:00 PM ET, Mon-Fri).`);
                return;
            }

            if (!confirm('Preview trades with E*TRADE?')) return;

            try {
                const resp = await fetch('/api/rebalance/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trades: buildResult.trades,
                        previewOnly: true
                    })
                });

                const result = await resp.json();
                alert(`Preview complete!\n\nSuccess: ${result.successCount}\nFailed: ${result.failedCount}`);
            } catch (err) {
                alert('Error previewing trades: ' + err.message);
            }
        }

        async function executeBuildTrades() {
            if (!buildResult || buildResult.trades.length === 0) return;

            const marketStatus = getMarketStatus();
            if (!marketStatus.isOpen) {
                alert(`⚠️ Market is currently closed (${marketStatus.statusText})\n\nCurrent time: ${marketStatus.currentTime} ET\n${marketStatus.nextEvent}\n\nTrade execution is only available during market hours (9:30 AM - 4:00 PM ET, Mon-Fri).`);
                return;
            }

            if (!confirm('⚠️ EXECUTE ALL TRADES?\n\nThis will place REAL orders with E*TRADE to build your portfolio!\n\nTotal Investment: ' + formatCurrency(buildResult.summary.totalInvestment) + '\n\nAre you sure?')) return;

            try {
                const resp = await fetch('/api/rebalance/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        trades: buildResult.trades,
                        previewOnly: false
                    })
                });

                const result = await resp.json();

                let message = `Portfolio Build Results:\n\n`;
                message += `Success: ${result.successCount}\n`;
                message += `Failed: ${result.failedCount}\n\n`;

                result.results.forEach(r => {
                    message += `${r.symbol} ${r.action}: ${r.success ? 'OK' : 'FAILED'} ${r.errorMessage || ''}\n`;
                });

                alert(message);

                // Refresh data
                loadRebalance();
                loadPortfolio();
            } catch (err) {
                alert('Error executing trades: ' + err.message);
            }
        }

        // ========== SAVE/LOAD PORTFOLIO FUNCTIONS ==========
        function showSavePortfolioModal() {
            if (!portfolioBuildItems || portfolioBuildItems.length === 0) {
                alert('Add some stocks/ETFs to your portfolio first before saving.');
                return;
            }

            const name = prompt('Enter a name for this portfolio:', `My Portfolio ${new Date().toLocaleDateString()}`);
            if (name && name.trim()) {
                if (savePortfolio(name.trim())) {
                    alert(`Portfolio "${name.trim()}" saved successfully!`);
                    // Re-render to update the Load dropdown
                    renderPortfolioBuilder(currentAnalysis);
                }
            }
        }

        async function loadAndRenderPortfolio(portfolioId) {
            if (loadSavedPortfolio(portfolioId)) {
                // Need to refresh prices for loaded items
                const symbols = portfolioBuildItems.map(i => i.symbol).join(',');
                try {
                    const resp = await fetch(`/api/market/quote/${symbols}`);
                    if (resp.ok) {
                        const quotes = await resp.json();
                        portfolioBuildItems.forEach(item => {
                            const quote = quotes.find(q => q.symbol.toUpperCase() === item.symbol.toUpperCase());
                            if (quote) {
                                item.currentPrice = quote.lastPrice;
                                item.changePercent = quote.changePercent;
                            }
                        });
                    }
                } catch (err) {
                    console.error('Failed to refresh quotes for loaded portfolio:', err);
                }

                renderPortfolioBuilder(currentAnalysis);
                renderETFSelection();
            }
        }

        function deleteAndRefresh(portfolioId) {
            if (confirm('Delete this saved portfolio?')) {
                deleteSavedPortfolio(portfolioId);
                renderPortfolioBuilder(currentAnalysis);
            }
        }

        // Update market status in header
        function updateMarketStatusHeader() {
            const el = document.getElementById('market-status-header');
            if (el) {
                el.innerHTML = renderMarketStatusBadge();
            }
        }

        // Update market status every minute
        setInterval(updateMarketStatusHeader, 60000);

        // Initial load
        updateMarketStatusHeader();
        loadPortfolio();
    </script>
</body>
</html>
