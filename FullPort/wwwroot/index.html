<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullPort - E*TRADE Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body { background-color: #f8f9fa; }
        .gain-positive { color: #198754; }
        .gain-negative { color: #dc3545; }
        .table-holdings th { font-size: 0.85rem; }
        .table-holdings td { font-size: 0.9rem; vertical-align: middle; }
        .symbol-badge { font-weight: 600; font-size: 0.95rem; }
        .holdings-filter { max-width: 300px; }
        .sort-btn { cursor: pointer; user-select: none; }
        .sort-btn:hover { color: #0d6efd; }
        .summary-card {
            background: var(--primary-gradient);
            border-radius: 16px;
            color: white;
        }
        .summary-card .label { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            opacity: 0.85;
        }
        .summary-card .value { font-weight: 600; }
        .stat-card {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .account-card {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .account-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .nav-tabs .nav-link { border-radius: 8px 8px 0 0; }
        .nav-tabs .nav-link.active { font-weight: 600; }
        .rebalance-card {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .model-card {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .model-card:hover {
            border-color: #6366f1;
        }
        .model-card.selected {
            border-color: #6366f1;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
        }
        .trade-buy { background-color: rgba(16, 185, 129, 0.1); }
        .trade-sell { background-color: rgba(239, 68, 68, 0.1); }
        .allocation-bar {
            height: 24px;
            border-radius: 6px;
            overflow: hidden;
            background: #e5e7eb;
        }
        .allocation-segment {
            height: 100%;
            display: inline-block;
            transition: width 0.3s;
        }
        /* Auth modal styling */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }
        .auth-modal {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 420px;
            width: 90%;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h4 class="mb-0">FullPort</h4>
            <button id="signout-btn" class="btn btn-link btn-sm text-muted text-decoration-none">
                <i class="bi bi-box-arrow-right me-1"></i>Sign Out
            </button>
        </div>
        <div class="mb-3" id="market-status-header"></div>
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button" role="tab">Dashboard</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="holdings-tab" data-bs-toggle="tab" data-bs-target="#holdings" type="button" role="tab">Holdings</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="analytics-tab" data-bs-toggle="tab" data-bs-target="#analytics" type="button" role="tab">Analytics</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="rebalance-tab" data-bs-toggle="tab" data-bs-target="#rebalance" type="button" role="tab">Rebalance</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="dividend-tab" data-bs-toggle="tab" data-bs-target="#dividend" type="button" role="tab">Dividends</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button" role="tab">Settings</button>
            </li>
        </ul>
        <div class="tab-content mt-3" id="mainTabsContent">
            <div class="tab-pane fade show active" id="dashboard" role="tabpanel">
                <div id="portfolio-info">Loading portfolio...</div>
                <div id="oob-auth" style="display:none;">
                    <div class="auth-overlay">
                        <div class="auth-modal">
                            <h5 class="mb-3">Connect to E*TRADE</h5>
                            <p class="text-muted mb-4">Click below to authorize access to your E*TRADE account. A new window will open for secure authentication.</p>
                            <button id="oob-auth-link" class="btn btn-primary w-100 mb-4" onclick="openETradeAuth()">
                                Open E*TRADE Authorization
                            </button>
                            <div>
                                <label for="oob-pin" class="form-label">Enter PIN from E*TRADE:</label>
                                <div class="input-group">
                                    <input type="text" id="oob-pin" class="form-control" placeholder="Enter PIN" />
                                    <button id="oob-submit" class="btn btn-success">Submit</button>
                                </div>
                                <div id="oob-error" class="text-danger mt-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tab-pane fade" id="holdings" role="tabpanel">
                <div id="holdings-info">Loading holdings...</div>
            </div>
            <div class="tab-pane fade" id="analytics" role="tabpanel">
                <div id="analytics-content">Loading analytics...</div>
            </div>
            <div class="tab-pane fade" id="rebalance" role="tabpanel">
                <div id="rebalance-content">Loading rebalance...</div>
            </div>
            <div class="tab-pane fade" id="dividend" role="tabpanel">
                <h5>Dividend Tracker</h5>
                <p class="text-muted">Coming soon...</p>
            </div>
            <div class="tab-pane fade" id="settings" role="tabpanel">
                <div id="settings-content"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Utility functions
        const formatCurrency = (val) => '$' + Number(val || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        const formatPercent = (val) => Number(val || 0).toFixed(2) + '%';
        const gainClass = (val) => val >= 0 ? 'gain-positive' : 'gain-negative';
        const gainIcon = (val) => val >= 0 ? '▲' : '▼';

        // Market hours utilities (US Eastern Time)
        function getMarketStatus() {
            const now = new Date();
            // Convert to Eastern Time
            const etOptions = { timeZone: 'America/New_York', hour: 'numeric', minute: 'numeric', hour12: false };
            const etTime = new Intl.DateTimeFormat('en-US', etOptions).format(now);
            const [hours, minutes] = etTime.split(':').map(Number);
            const etMinutes = hours * 60 + minutes;

            const dayOfWeek = new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York', weekday: 'short' });
            const isWeekend = dayOfWeek === 'Sat' || dayOfWeek === 'Sun';

            const marketOpen = 9 * 60 + 30;  // 9:30 AM ET
            const marketClose = 16 * 60;      // 4:00 PM ET

            const isOpen = !isWeekend && etMinutes >= marketOpen && etMinutes < marketClose;

            // Format current ET time for display
            const etDisplayTime = now.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true });

            let statusText, statusClass, nextEvent;
            if (isWeekend) {
                statusText = 'Market Closed (Weekend)';
                statusClass = 'text-warning';
                nextEvent = 'Opens Monday 9:30 AM ET';
            } else if (etMinutes < marketOpen) {
                const minsUntilOpen = marketOpen - etMinutes;
                const hoursUntil = Math.floor(minsUntilOpen / 60);
                const minsUntil = minsUntilOpen % 60;
                statusText = 'Pre-Market';
                statusClass = 'text-warning';
                nextEvent = `Opens in ${hoursUntil > 0 ? hoursUntil + 'h ' : ''}${minsUntil}m`;
            } else if (etMinutes >= marketClose) {
                statusText = 'After Hours';
                statusClass = 'text-warning';
                nextEvent = 'Opens tomorrow 9:30 AM ET';
            } else {
                const minsUntilClose = marketClose - etMinutes;
                const hoursUntil = Math.floor(minsUntilClose / 60);
                const minsUntil = minsUntilClose % 60;
                statusText = 'Market Open';
                statusClass = 'text-success';
                nextEvent = `Closes in ${hoursUntil > 0 ? hoursUntil + 'h ' : ''}${minsUntil}m`;
            }

            return { isOpen, statusText, statusClass, nextEvent, currentTime: etDisplayTime, dayOfWeek };
        }

        // Personalized greeting based on time of day
        function getPersonalizedGreeting(userName = 'Investor') {
            const now = new Date();
            const hour = now.getHours();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[now.getDay()];

            let greeting;
            if (hour < 12) {
                greeting = 'Good Morning';
            } else if (hour < 17) {
                greeting = 'Good Afternoon';
            } else {
                greeting = 'Good Evening';
            }

            return {
                greeting,
                dayName,
                fullGreeting: `${greeting}, ${userName}`,
                dayMessage: `Happy ${dayName}!`,
                dateFormatted: now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
            };
        }

        // Settings storage keys
        const USER_NAME_KEY = 'fullport_user_name';
        const SETTINGS_KEY = 'fullport_settings';

        // Default settings
        const DEFAULT_SETTINGS = {
            displayName: 'Darrell',
            defaultTab: 'dashboard',
            cashReservePercent: 5,
            minTradeValue: 50,
            tolerancePercent: 2,
            compactNumbers: false,
            showMarketStatus: true,
            autoRefreshMinutes: 0  // 0 = disabled
        };

        function getSettings() {
            try {
                const saved = localStorage.getItem(SETTINGS_KEY);
                return saved ? { ...DEFAULT_SETTINGS, ...JSON.parse(saved) } : DEFAULT_SETTINGS;
            } catch {
                return DEFAULT_SETTINGS;
            }
        }

        function saveSettings(settings) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        }

        function getUserName() {
            return getSettings().displayName || 'Darrell';
        }

        function setUserName(name) {
            const settings = getSettings();
            settings.displayName = name;
            saveSettings(settings);
        }

        // Render settings page
        function renderSettings() {
            const settings = getSettings();
            const savedPortfolios = getSavedPortfolios();

            document.getElementById('settings-content').innerHTML = `
                <div class="row">
                    <div class="col-lg-8">
                        <h5 class="mb-4">Settings</h5>

                        <!-- User Profile -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-person me-2"></i>User Profile</h6>
                            </div>
                            <div class="card-body">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Display Name</label>
                                        <small class="text-muted d-block">Used in personalized greetings</small>
                                    </div>
                                    <div class="col-md-8">
                                        <input type="text" id="setting-displayName" class="form-control" 
                                               value="${settings.displayName}" placeholder="Enter your name">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Display Preferences -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-display me-2"></i>Display Preferences</h6>
                            </div>
                            <div class="card-body">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Default Tab</label>
                                        <small class="text-muted d-block">Tab shown on startup</small>
                                    </div>
                                    <div class="col-md-8">
                                        <select id="setting-defaultTab" class="form-select">
                                            <option value="dashboard" ${settings.defaultTab === 'dashboard' ? 'selected' : ''}>Dashboard</option>
                                            <option value="holdings" ${settings.defaultTab === 'holdings' ? 'selected' : ''}>Holdings</option>
                                            <option value="analytics" ${settings.defaultTab === 'analytics' ? 'selected' : ''}>Analytics</option>
                                            <option value="rebalance" ${settings.defaultTab === 'rebalance' ? 'selected' : ''}>Rebalance</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Compact Numbers</label>
                                        <small class="text-muted d-block">Show 1.2K instead of 1,200</small>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="form-check form-switch">
                                            <input type="checkbox" id="setting-compactNumbers" class="form-check-input" 
                                                   ${settings.compactNumbers ? 'checked' : ''}>
                                        </div>
                                    </div>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Show Market Status</label>
                                        <small class="text-muted d-block">Display market open/closed indicator</small>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="form-check form-switch">
                                            <input type="checkbox" id="setting-showMarketStatus" class="form-check-input" 
                                                   ${settings.showMarketStatus ? 'checked' : ''}>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Portfolio Defaults -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-sliders me-2"></i>Portfolio Builder Defaults</h6>
                            </div>
                            <div class="card-body">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Cash Reserve %</label>
                                        <small class="text-muted d-block">Default cash to keep uninvested</small>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="input-group" style="max-width: 150px;">
                                            <input type="number" id="setting-cashReservePercent" class="form-control" 
                                                   value="${settings.cashReservePercent}" min="0" max="50" step="1">
                                            <span class="input-group-text">%</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Minimum Trade Value</label>
                                        <small class="text-muted d-block">Skip trades below this amount</small>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="input-group" style="max-width: 150px;">
                                            <span class="input-group-text">$</span>
                                            <input type="number" id="setting-minTradeValue" class="form-control" 
                                                   value="${settings.minTradeValue}" min="0" max="500" step="10">
                                        </div>
                                    </div>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Rebalance Tolerance %</label>
                                        <small class="text-muted d-block">Don't trade if within this % of target</small>
                                    </div>
                                    <div class="col-md-8">
                                        <div class="input-group" style="max-width: 150px;">
                                            <input type="number" id="setting-tolerancePercent" class="form-control" 
                                                   value="${settings.tolerancePercent}" min="0" max="10" step="0.5">
                                            <span class="input-group-text">%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Data Management -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-database me-2"></i>Data Management</h6>
                            </div>
                            <div class="card-body">
                                <div class="row align-items-center mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">Saved Portfolios</label>
                                        <small class="text-muted d-block">${savedPortfolios.length} portfolio(s) saved</small>
                                    </div>
                                    <div class="col-md-8">
                                        <button class="btn btn-outline-danger btn-sm" onclick="clearSavedPortfolios()" 
                                                ${savedPortfolios.length === 0 ? 'disabled' : ''}>
                                            <i class="bi bi-trash me-1"></i>Clear All Saved Portfolios
                                        </button>
                                    </div>
                                </div>
                                <div class="row align-items-center">
                                    <div class="col-md-4">
                                        <label class="form-label mb-0">All Settings</label>
                                        <small class="text-muted d-block">Reset to defaults</small>
                                    </div>
                                    <div class="col-md-8">
                                        <button class="btn btn-outline-warning btn-sm" onclick="resetAllSettings()">
                                            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Defaults
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Save Button -->
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" onclick="saveAllSettings()">
                                <i class="bi bi-check-lg me-1"></i>Save Settings
                            </button>
                            <span id="settings-save-status" class="align-self-center text-success" style="display:none;">
                                <i class="bi bi-check-circle me-1"></i>Saved!
                            </span>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="col-lg-4">
                        <!-- Connection Status -->
                        <div class="card mb-4">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-plug me-2"></i>E*TRADE Connection</h6>
                            </div>
                            <div class="card-body">
                                <div class="d-flex align-items-center mb-3">
                                    <span class="text-success me-2">●</span>
                                    <span>Connected to E*TRADE API</span>
                                </div>
                                <button class="btn btn-outline-secondary btn-sm w-100 mb-2" onclick="window.open('https://us.etrade.com/etx/hw/accountshome', '_blank')">
                                    <i class="bi bi-box-arrow-up-right me-1"></i>Open E*TRADE
                                </button>
                                <button class="btn btn-outline-danger btn-sm w-100" onclick="document.getElementById('signout-btn').click()">
                                    <i class="bi bi-box-arrow-right me-1"></i>Disconnect & Sign Out
                                </button>
                            </div>
                        </div>

                        <!-- About -->
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>About FullPort</h6>
                            </div>
                            <div class="card-body">
                                <p class="small text-muted mb-2">
                                    FullPort is a portfolio management tool that integrates with E*TRADE to help you track, analyze, and rebalance your investments.
                                </p>
                                <p class="small text-muted mb-0">
                                    <strong>Version:</strong> 1.0.0<br>
                                    <strong>API:</strong> E*TRADE v1
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function saveAllSettings() {
            const settings = {
                displayName: document.getElementById('setting-displayName').value || 'Darrell',
                defaultTab: document.getElementById('setting-defaultTab').value,
                compactNumbers: document.getElementById('setting-compactNumbers').checked,
                showMarketStatus: document.getElementById('setting-showMarketStatus').checked,
                cashReservePercent: parseFloat(document.getElementById('setting-cashReservePercent').value) || 5,
                minTradeValue: parseFloat(document.getElementById('setting-minTradeValue').value) || 50,
                tolerancePercent: parseFloat(document.getElementById('setting-tolerancePercent').value) || 2
            };
            saveSettings(settings);

            // Show saved status
            const status = document.getElementById('settings-save-status');
            status.style.display = 'inline';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }

        function clearSavedPortfolios() {
            if (confirm('Are you sure you want to delete all saved portfolios? This cannot be undone.')) {
                localStorage.removeItem(SAVED_PORTFOLIOS_KEY);
                renderSettings();
            }
        }

        function resetAllSettings() {
            if (confirm('Reset all settings to defaults? Your saved portfolios will NOT be deleted.')) {
                localStorage.removeItem(SETTINGS_KEY);
                renderSettings();
            }
        }

        // Market indices data (will be fetched from API)
        let marketIndices = null;

        async function fetchMarketIndices() {
            try {
                const resp = await fetch('/api/market/indices');
                if (resp.ok) {
                    marketIndices = await resp.json();
                    return marketIndices;
                }
            } catch (e) {
                console.log('Could not fetch market indices:', e);
            }
            return null;
        }

        function renderMarketStatusBadge() {
            const status = getMarketStatus();
            return `
                <div class="d-inline-flex align-items-center px-2 py-1 rounded ${status.isOpen ? 'bg-success bg-opacity-10' : 'bg-warning bg-opacity-10'}">
                    <span class="me-2 ${status.statusClass}" style="width: 8px; height: 8px; border-radius: 50%; background: currentColor; display: inline-block;"></span>
                    <small class="${status.statusClass} fw-bold">${status.statusText}</small>
                    <small class="text-muted ms-2">${status.currentTime} ET</small>
                    <small class="text-muted ms-2">• ${status.nextEvent}</small>
                </div>
            `;
        }

        // Saved portfolios utilities
        const SAVED_PORTFOLIOS_KEY = 'fullport_saved_portfolios';

        function getSavedPortfolios() {
            try {
                const saved = localStorage.getItem(SAVED_PORTFOLIOS_KEY);
                return saved ? JSON.parse(saved) : [];
            } catch {
                return [];
            }
        }

        function savePortfolio(name) {
            if (!portfolioBuildItems || portfolioBuildItems.length === 0) {
                alert('No portfolio items to save');
                return false;
            }

            const portfolios = getSavedPortfolios();
            const newPortfolio = {
                id: Date.now(),
                name: name,
                savedAt: new Date().toISOString(),
                modelIndex: builderSelectedModel,
                items: portfolioBuildItems.map(item => ({
                    symbol: item.symbol,
                    name: item.name,
                    assetClass: item.assetClass,
                    targetPercent: item.targetPercent,
                    fixedShares: item.fixedShares,
                    isCustom: item.isCustom
                }))
            };

            // Check for duplicate name and update if exists

                symbol: h.symbol || h.Symbol || '',
                description: h.description || h.Description || '',
                assetClass: h.assetClass || h.AssetClass || 'Other',
                quantity: h.quantity || h.totalQuantity || h.TotalQuantity || 0,
                marketValue: h.marketValue || h.totalMarketValue || h.TotalMarketValue || 0,
                costBasis: h.costBasis || h.totalCostBasis || h.TotalCostBasis || 0,
                avgCostPerShare: h.avgCostPerShare || (h.costBasis && h.quantity ? h.costBasis / h.quantity : 0),
                currentPrice: h.currentPrice || h.Price || 0,
                dayChange: h.dayChange || 0,
                dayChangePercent: h.dayChangePercent || 0,
                dayGain: h.dayGain || h.totalDayGain || h.TotalDayGain || 0,
                totalGain: h.totalGain || h.TotalGain || 0,
                totalGainPercent: h.totalGainPercent || h.TotalGainPercent || 0,
                portfolioPercent: h.portfolioPercent || h.PortfolioPercent || 0,
                dividendYield: h.dividendYield || 0,
                annualDividendIncome: h.annualDividendIncome || 0,
                lots: h.lots || [],
                lotCount: h.lotCount || 0,
                bid: h.bid || 0,
                ask: h.ask || 0,
                high52Week: h.high52Week || 0,
                low52Week: h.low52Week || 0,
                range52WeekPercent: h.range52WeekPercent || 0,
                volume: h.volume || 0,
                avgVolume: h.avgVolume || 0,
                volumeVsAvg: h.volumeVsAvg || 0,
                peRatio: h.peRatio || 0,
                marketCap: h.marketCap || 0,
                beta: h.beta || 0,
                spread: h.spread || 0,
                spreadPercent: h.spreadPercent || 0,
                yieldOnCost: h.yieldOnCost || 0,
                dividend: h.dividend || 0,
                exDividendDate: h.exDividendDate || null
            }));

            // Apply filters
            if (holdingsFilter.assetClass !== 'all') {
                holdings = holdings.filter(h => h.assetClass === holdingsFilter.assetClass);
            }
            if (holdingsFilter.gainLoss === 'winners') {
                holdings = holdings.filter(h => h.totalGain > 0);
            } else if (holdingsFilter.gainLoss === 'losers') {
                holdings = holdings.filter(h => h.totalGain < 0);
            }
            if (holdingsFilter.search) {
                const searchLower = holdingsFilter.search.toLowerCase();
                holdings = holdings.filter(h => 
                    h.symbol.toLowerCase().includes(searchLower) || 
                    (h.description && h.description.toLowerCase().includes(searchLower))
                );
            }

            // Sort holdings
            holdings.sort((a, b) => {
                let valA = a[sortColumn] || 0;
                let valB = b[sortColumn] || 0;
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (sortAsc) return valA > valB ? 1 : -1;
                return valA < valB ? 1 : -1;
            });

            let html = `
            <!-- Holdings Summary Header -->
            <div class="summary-card p-4 mb-4">
                <div class="row g-3">
                    <div class="col-6 col-md-2">
                        <div class="label">Market Value</div>
                        <div class="value h4 mb-0">${formatCurrency(summary.totalMarketValue)}</div>
                    </div>
                    <div class="col-6 col-md-2">
                        <div class="label">Day's Change</div>
                        <div class="value h5 mb-0 ${summary.totalDayGain >= 0 ? '' : 'text-warning'}">${gainIcon(summary.totalDayGain)} ${formatCurrency(Math.abs(summary.totalDayGain))}</div>
                        <small class="opacity-75">${summary.totalDayGainPercent >= 0 ? '+' : ''}${summary.totalDayGainPercent?.toFixed(2) || 0}%</small>
                    </div>
                    <div class="col-6 col-md-2">
                        <div class="label">Total Return</div>
                        <div class="value h5 mb-0 ${summary.totalGain >= 0 ? '' : 'text-warning'}">${gainIcon(summary.totalGain)} ${formatCurrency(Math.abs(summary.totalGain))}</div>
                        <small class="opacity-75">${summary.totalGainPercent >= 0 ? '+' : ''}${summary.totalGainPercent?.toFixed(2) || 0}%</small>
                    </div>
                    <div class="col-6 col-md-2">
                        <div class="label">Win Rate</div>
                        <div class="value h5 mb-0">${summary.winRate?.toFixed(0) || 0}%</div>
                        <small class="opacity-75">${summary.winningPositions}W / ${summary.losingPositions}L</small>
                    </div>
                    <div class="col-6 col-md-2">
                        <div class="label">Annual Dividends</div>
                        <div class="value h5 mb-0">${formatCurrency(income?.totalAnnualDividends || 0)}</div>
                        <small class="opacity-75">${income?.portfolioYield?.toFixed(2) || 0}% yield</small>
                    </div>
                    <div class="col-6 col-md-2">
                        <div class="label">Positions</div>
                        <div class="value h5 mb-0">${summary.totalPositions}</div>
                        <small class="opacity-75">${diversification?.effectivePositions?.toFixed(1) || 0} effective</small>
                    </div>
                </div>
            </div>

            <!-- Performance Highlights -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="chart-card p-3 h-100">
                        <h6 class="small text-muted mb-2">Best Performer</h6>
                        ${performance?.bestPerformer ? `
                            <div class="d-flex align-items-center">
                                <span class="symbol-badge text-primary h5 mb-0 me-2">${performance.bestPerformer.symbol}</span>
                                <span class="text-success h5 mb-0">+${performance.bestPerformer.totalGainPercent?.toFixed(2)}%</span>
                            </div>
                            <small class="text-muted">${formatCurrency(performance.bestPerformer.totalGain)} gain</small>
                        ` : '<span class="text-muted">-</span>'}
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="chart-card p-3 h-100">
                        <h6 class="small text-muted mb-2">Worst Performer</h6>
                        ${performance?.worstPerformer ? `
                            <div class="d-flex align-items-center">
                                <span class="symbol-badge text-primary h5 mb-0 me-2">${performance.worstPerformer.symbol}</span>
                                <span class="text-danger h5 mb-0">${performance.worstPerformer.totalGainPercent?.toFixed(2)}%</span>
                            </div>
                            <small class="text-muted">${formatCurrency(performance.worstPerformer.totalGain)} loss</small>
                        ` : '<span class="text-muted">-</span>'}
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="chart-card p-3 h-100">
                        <h6 class="small text-muted mb-2">Largest Position</h6>
                        ${performance?.largestPosition ? `
                            <div class="d-flex align-items-center">
                                <span class="symbol-badge text-primary h5 mb-0 me-2">${performance.largestPosition.symbol}</span>
                                <span class="h5 mb-0">${performance.largestPosition.portfolioPercent?.toFixed(1)}%</span>
                            </div>
                            <small class="text-muted">${formatCurrency(performance.largestPosition.marketValue)}</small>
                        ` : '<span class="text-muted">-</span>'}
                    </div>
                </div>
            </div>

            <!-- Filters and View Controls -->
            <div class="chart-card mb-4">
                <div class="p-3 border-bottom d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <h6 class="mb-0">Holdings</h6>
                        <span class="badge bg-secondary">${holdings.length} positions</span>
                    </div>
                    <div class="d-flex flex-wrap gap-2 align-items-center">
                        <select class="form-select form-select-sm" style="width: 140px;" onchange="filterByAssetClass(this.value)">
                            <option value="all" ${holdingsFilter.assetClass === 'all' ? 'selected' : ''}>All Classes</option>
                            ${diversification?.byAssetClass?.map(ac => `
                                <option value="${ac.assetClass}" ${holdingsFilter.assetClass === ac.assetClass ? 'selected' : ''}>${ac.assetClass} (${ac.count})</option>
                            `).join('') || ''}
                        </select>
                        <select class="form-select form-select-sm" style="width: 120px;" onchange="filterByGainLoss(this.value)">
                            <option value="all" ${holdingsFilter.gainLoss === 'all' ? 'selected' : ''}>All</option>
                            <option value="winners" ${holdingsFilter.gainLoss === 'winners' ? 'selected' : ''}>Winners</option>
                            <option value="losers" ${holdingsFilter.gainLoss === 'losers' ? 'selected' : ''}>Losers</option>
                        </select>
                        <input type="text" class="form-control form-control-sm" style="width: 150px;" placeholder="Search..." value="${holdingsFilter.search}" oninput="filterBySearch(this.value)">
                        <div class="btn-group btn-group-sm">
                            <button class="btn ${holdingsViewMode === 'table' ? 'btn-primary' : 'btn-outline-secondary'}" onclick="setViewMode('table')" title="Table View">
                                <i class="bi bi-table"></i>
                            </button>
                            <button class="btn ${holdingsViewMode === 'cards' ? 'btn-primary' : 'btn-outline-secondary'}" onclick="setViewMode('cards')" title="Card View">
                                <i class="bi bi-grid-3x2-gap"></i>
                            </button>
                        </div>
                    </div>
                </div>

                ${holdingsViewMode === 'table' ? renderHoldingsTable(holdings) : renderHoldingsCards(holdings)}
            </div>
            `;

            document.getElementById('holdings-info').innerHTML = html;
        }

        function renderHoldingsTable(holdings) {
            return `
                <div class="table-responsive">
                    <table class="table table-hover table-holdings mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="sort-btn" onclick="sortHoldings('symbol')">Symbol ${sortColumn === 'symbol' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('currentPrice')">Price ${sortColumn === 'currentPrice' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('dayChangePercent')">Day ${sortColumn === 'dayChangePercent' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('quantity')">Shares ${sortColumn === 'quantity' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('marketValue')">Value ${sortColumn === 'marketValue' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('avgCostPerShare')">Avg Cost ${sortColumn === 'avgCostPerShare' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('totalGain')">Total Gain ${sortColumn === 'totalGain' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('totalGainPercent')">Return ${sortColumn === 'totalGainPercent' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th class="text-end sort-btn" onclick="sortHoldings('portfolioPercent')">Weight ${sortColumn === 'portfolioPercent' ? (sortAsc ? '▲' : '▼') : ''}</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="holdings-tbody">
                            ${holdings.map(h => `
                                <tr class="holding-row ${expandedHoldings.has(h.symbol) ? 'table-active' : ''}" data-symbol="${h.symbol.toLowerCase()}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div style="width: 8px; height: 8px; border-radius: 50%; background: ${assetClassColors[h.assetClass] || '#64748b'};" class="me-2"></div>
                                            <div>
                                                <span class="symbol-badge text-primary">${h.symbol}</span>
                                                <small class="d-block text-muted text-truncate" style="max-width: 120px;">${h.description || ''}</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-end">
                                        ${formatCurrency(h.currentPrice || 0)}
                                        ${h.bid && h.ask ? `<small class="d-block text-muted">${formatCurrency(h.bid)} × ${formatCurrency(h.ask)}</small>` : ''}
                                    </td>
                                    <td class="text-end ${h.dayChangePercent >= 0 ? 'gain-positive' : 'gain-negative'}">
                                        ${h.dayChangePercent >= 0 ? '+' : ''}${h.dayChangePercent?.toFixed(2) || 0}%
                                        <small class="d-block">${h.dayChange >= 0 ? '+' : ''}${formatCurrency(h.dayChange || 0)}</small>
                                    </td>
                                    <td class="text-end">${Number(h.quantity).toLocaleString(undefined, {maximumFractionDigits: 4})}</td>
                                    <td class="text-end fw-bold">${formatCurrency(h.marketValue)}</td>
                                    <td class="text-end">${formatCurrency(h.avgCostPerShare || 0)}</td>
                                    <td class="text-end ${h.totalGain >= 0 ? 'gain-positive' : 'gain-negative'}">
                                        ${h.totalGain >= 0 ? '+' : ''}${formatCurrency(h.totalGain)}
                                    </td>
                                    <td class="text-end ${h.totalGainPercent >= 0 ? 'gain-positive' : 'gain-negative'}">
                                        ${h.totalGainPercent >= 0 ? '+' : ''}${h.totalGainPercent?.toFixed(2) || 0}%
                                    </td>
                                    <td class="text-end">
                                        <div class="d-flex align-items-center justify-content-end">
                                            <div class="progress me-2" style="width: 40px; height: 6px;">
                                                <div class="progress-bar" style="width: ${Math.min(h.portfolioPercent || 0, 100)}%"></div>
                                            </div>
                                            ${(h.portfolioPercent || 0).toFixed(1)}%
                                        </div>
                                    </td>
                                    <td>
                                        <button class="btn btn-link btn-sm p-0" onclick="toggleHoldingDetails('${h.symbol}')" title="Details">
                                            <i class="bi bi-chevron-${expandedHoldings.has(h.symbol) ? 'up' : 'down'}"></i>
                                        </button>
                                    </td>
                                </tr>
                                ${expandedHoldings.has(h.symbol) ? renderHoldingDetails(h) : ''}
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderHoldingDetails(h) {
            return `
                <tr class="holding-details bg-light">
                    <td colspan="10">
                        <div class="p-3">
                            <div class="row g-4">
                                <!-- Market Data -->
                                <div class="col-md-3">
                                    <h6 class="small text-muted mb-2">Market Data</h6>
                                    <div class="small">
                                        <div class="d-flex justify-content-between"><span>52W High:</span><span>${formatCurrency(h.high52Week || 0)}</span></div>
                                        <div class="d-flex justify-content-between"><span>52W Low:</span><span>${formatCurrency(h.low52Week || 0)}</span></div>
                                        <div class="d-flex justify-content-between"><span>52W Range:</span>
                                            <div class="d-flex align-items-center">
                                                <div class="progress" style="width: 50px; height: 4px;">
                                                    <div class="progress-bar bg-primary" style="width: ${h.range52WeekPercent || 0}%"></div>
                                                </div>
                                                <span class="ms-1">${(h.range52WeekPercent || 0).toFixed(0)}%</span>
                                            </div>
                                        </div>
                                        <div class="d-flex justify-content-between"><span>Volume:</span><span>${(h.volume || 0).toLocaleString()}</span></div>
                                        <div class="d-flex justify-content-between"><span>Avg Volume:</span><span>${(h.avgVolume || 0).toLocaleString()}</span></div>
                                        <div class="d-flex justify-content-between"><span>Vol vs Avg:</span>
                                            <span class="${(h.volumeVsAvg || 0) > 100 ? 'text-success' : 'text-muted'}">${(h.volumeVsAvg || 0).toFixed(0)}%</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Fundamentals -->
                                <div class="col-md-3">
                                    <h6 class="small text-muted mb-2">Fundamentals</h6>
                                    <div class="small">
                                        <div class="d-flex justify-content-between"><span>P/E Ratio:</span><span>${h.peRatio ? h.peRatio.toFixed(2) : '-'}</span></div>
                                        <div class="d-flex justify-content-between"><span>Market Cap:</span><span>${h.marketCap ? formatLargeNumber(h.marketCap) : '-'}</span></div>
                                        <div class="d-flex justify-content-between"><span>Beta:</span><span>${h.beta ? h.beta.toFixed(2) : '-'}</span></div>
                                        <div class="d-flex justify-content-between"><span>Spread:</span><span>${formatCurrency(h.spread || 0)} (${(h.spreadPercent || 0).toFixed(2)}%)</span></div>
                                    </div>
                                </div>

                                <!-- Dividends -->
                                <div class="col-md-3">
                                    <h6 class="small text-muted mb-2">Dividends</h6>
                                    <div class="small">
                                        <div class="d-flex justify-content-between"><span>Dividend:</span><span>${formatCurrency(h.dividend || 0)}</span></div>
                                        <div class="d-flex justify-content-between"><span>Yield:</span><span>${(h.dividendYield || 0).toFixed(2)}%</span></div>
                                        <div class="d-flex justify-content-between"><span>Annual Income:</span><span class="text-success">${formatCurrency(h.annualDividendIncome || 0)}</span></div>
                                        <div class="d-flex justify-content-between"><span>Yield on Cost:</span><span>${(h.yieldOnCost || 0).toFixed(2)}%</span></div>
                                        <div class="d-flex justify-content-between"><span>Ex-Div Date:</span><span>${h.exDividendDate ? new Date(h.exDividendDate).toLocaleDateString() : '-'}</span></div>
                                    </div>
                                </div>

                                <!-- Tax Lots -->
                                <div class="col-md-3">
                                    <h6 class="small text-muted mb-2">Tax Lots (${h.lotCount || 0})</h6>
                                    ${h.lots && h.lots.length > 0 ? `
                                        <div class="small" style="max-height: 120px; overflow-y: auto;">
                                            ${h.lots.map(lot => `
                                                <div class="border-bottom py-1">
                                                    <div class="d-flex justify-content-between">
                                                        <span>${lot.quantity} shares @ ${formatCurrency(lot.costPerShare)}</span>
                                                        <span class="${lot.gain >= 0 ? 'text-success' : 'text-danger'}">${lot.gain >= 0 ? '+' : ''}${lot.gainPercent?.toFixed(1)}%</span>
                                                    </div>
                                                    <small class="text-muted">${lot.accountName || lot.accountType} • ${lot.termType || 'N/A'}</small>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : '<span class="text-muted small">No lot data available</span>'}
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        }

        function renderHoldingsCards(holdings) {
            return `
                <div class="p-3">
                    <div class="row g-3">
                        ${holdings.map(h => `
                            <div class="col-md-4 col-lg-3">
                                <div class="card h-100" style="border-left: 4px solid ${assetClassColors[h.assetClass] || '#64748b'};">
                                    <div class="card-body p-3">
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <div>
                                                <h6 class="mb-0 text-primary">${h.symbol}</h6>
                                                <small class="text-muted text-truncate d-block" style="max-width: 150px;">${h.description || ''}</small>
                                            </div>
                                            <span class="badge ${h.totalGain >= 0 ? 'bg-success' : 'bg-danger'}">${h.totalGainPercent >= 0 ? '+' : ''}${h.totalGainPercent?.toFixed(1)}%</span>
                                        </div>
                                        <div class="mb-2">
                                            <div class="h5 mb-0">${formatCurrency(h.marketValue)}</div>
                                            <small class="text-muted">${h.quantity} shares @ ${formatCurrency(h.currentPrice)}</small>
                                        </div>
                                        <div class="row g-2 small">
                                            <div class="col-6">
                                                <span class="text-muted">Day:</span>
                                                <span class="${h.dayChangePercent >= 0 ? 'text-success' : 'text-danger'}">${h.dayChangePercent >= 0 ? '+' : ''}${h.dayChangePercent?.toFixed(2)}%</span>
                                            </div>
                                            <div class="col-6">
                                                <span class="text-muted">Gain:</span>
                                                <span class="${h.totalGain >= 0 ? 'text-success' : 'text-danger'}">${formatCurrency(h.totalGain)}</span>
                                            </div>
                                            <div class="col-6">
                                                <span class="text-muted">Weight:</span>
                                                <span>${h.portfolioPercent?.toFixed(1)}%</span>
                                            </div>
                                            <div class="col-6">
                                                <span class="text-muted">Yield:</span>
                                                <span>${(h.dividendYield || 0).toFixed(2)}%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function toggleHoldingDetails(symbol) {
            if (expandedHoldings.has(symbol)) {
                expandedHoldings.delete(symbol);
            } else {
                expandedHoldings.add(symbol);
            }
            renderDetailedHoldings(holdingsData);
        }

        function setViewMode(mode) {
            holdingsViewMode = mode;
            renderDetailedHoldings(holdingsData);
        }

        function filterByAssetClass(value) {
            holdingsFilter.assetClass = value;
            renderDetailedHoldings(holdingsData);
        }

        function filterByGainLoss(value) {
            holdingsFilter.gainLoss = value;
            renderDetailedHoldings(holdingsData);
        }

        function filterBySearch(value) {
            holdingsFilter.search = value;
            renderDetailedHoldings(holdingsData);
        }

        function formatLargeNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        function renderHoldings(data) {
            // Fallback for old data format
            renderDetailedHoldings(data);
        }

        function sortHoldings(column) {
            if (sortColumn === column) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = column;
                sortAsc = column === 'symbol';
            }
            if (holdingsData) renderDetailedHoldings(holdingsData);
        }

        function filterHoldings(query) {
            holdingsFilter.search = query;
            if (holdingsData) renderDetailedHoldings(holdingsData);
        }

        // Event handlers
        document.getElementById('oob-submit').onclick = async function() {
            const pin = document.getElementById('oob-pin').value;
            const token = window._oobToken;
            document.getElementById('oob-error').innerText = '';
            if (!pin || !token) {
                document.getElementById('oob-error').innerText = 'PIN and token required.';
                return;
            }
            const resp = await fetch('/api/portfolio/access-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ oauthToken: token, pin })
            });
            if (resp.ok) {
                document.getElementById('oob-auth').style.display = 'none';
                loadPortfolio();
            } else {
                let msg = 'Failed to exchange PIN.';
                try { msg += '\n' + (await resp.text()); } catch {}
                document.getElementById('oob-error').innerText = msg;
            }
        };

        // Load holdings when tab is clicked
        document.getElementById('holdings-tab').addEventListener('shown.bs.tab', function() {
            // Always try to load if no data or if current content shows an error/auth message
            const currentContent = document.getElementById('holdings-info').innerHTML;
            if (!holdingsData || currentContent.includes('Authentication') || currentContent.includes('Error') || currentContent.includes('Loading')) {
                loadHoldings();
            }
        });

        // Load analytics when tab is clicked
        document.getElementById('analytics-tab').addEventListener('shown.bs.tab', function() {
            loadAnalytics();
        });

        // Load rebalance when tab is clicked
        document.getElementById('rebalance-tab').addEventListener('shown.bs.tab', function() {
            loadRebalance();
        });

        // Load settings when tab is clicked
        document.getElementById('settings-tab').addEventListener('shown.bs.tab', function() {
            renderSettings();
        });

        document.getElementById('signout-btn').onclick = async function() {
            if (confirm('Sign out and clear E*TRADE session?')) {
                await fetch('/api/portfolio/sign-out', { method: 'POST' });
                holdingsData = null;
                loadPortfolio();
            }
        };

        // ========== ANALYTICS FUNCTIONALITY ==========
        let analyticsData = null;
        let correlationData = null;
        let benchmarkData = null;

        async function loadAnalytics() {
            document.getElementById('analytics-content').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">Analyzing portfolio...</p></div>';

            try {
                const [healthResp, correlationResp, benchmarkResp] = await Promise.all([
                    fetch('/api/analytics/portfolio-health'),
                    fetch('/api/analytics/correlation'),
                    fetch('/api/analytics/benchmark-comparison')
                ]);

                if (healthResp.ok) analyticsData = await healthResp.json();
                if (correlationResp.ok) correlationData = await correlationResp.json();
                if (benchmarkResp.ok) benchmarkData = await benchmarkResp.json();

                if (analyticsData?.hasData) {
                    renderAnalytics();
                } else {
                    document.getElementById('analytics-content').innerHTML = '<div class="alert alert-info">No holdings data available for analysis. Add positions to your portfolio first.</div>';
                }
            } catch (err) {
                console.error('Analytics error:', err);
                document.getElementById('analytics-content').innerHTML = '<div class="alert alert-danger">Error loading analytics.</div>';
            }
        }

        function renderAnalytics() {
            const health = analyticsData;
            const correlation = correlationData;
            const benchmark = benchmarkData;

            // Health score color
            const scoreColor = health.healthScore >= 70 ? '#10b981' : health.healthScore >= 50 ? '#f59e0b' : '#ef4444';
            const scoreLabel = health.healthScore >= 70 ? 'Good' : health.healthScore >= 50 ? 'Fair' : 'Needs Attention';

            let html = `
            <!-- Portfolio Health Score -->
            <div class="row g-4 mb-4">
